<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Social Media Metadata CSV</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; line-height: 1.5; color: #222; }
    h1 { margin-bottom: 8px; }
    textarea { width: 100%; min-height: 200px; padding: 12px; box-sizing: border-box; font-family: monospace; }
    button { padding: 10px 16px; font-size: 14px; cursor: pointer; }
    .row { margin: 12px 0; }
    .status { margin-top: 8px; font-size: 14px; color: #444; }
    #download-link { display: none; margin-top: 12px; }
    .muted { color: #666; font-size: 13px; }
  </style>
</head>
<body>
  <h1>Social Media Metadata CSV</h1>
  <div class="row">
    <label for="urls-input"><strong>YouTube, TikTok, Instagram, or Spotify URLs (one per line)</strong></label><br />
    <textarea id="urls-input" placeholder="https://www.youtube.com/watch?v=dQw4w9WgXcQ"></textarea>
  </div>
  <div class="row">
    <button id="generate-btn">Generate CSV</button>
  </div>
  <div class="status" id="progress-text">Processed 0 of 0 valid videos</div>
  <div class="status muted" id="skipped-text"></div>
  <div class="status muted" id="failed-text"></div>
  <a id="download-link" href="#" download>Download CSV</a>

  <script>
    // Use same-origin API to avoid CORS issues when served locally
    const API_BASE = '';
    const urlsInput = document.getElementById('urls-input');
    const generateBtn = document.getElementById('generate-btn');
    const progressText = document.getElementById('progress-text');
    const skippedText = document.getElementById('skipped-text');
    const failedText = document.getElementById('failed-text');
    const downloadLink = document.getElementById('download-link');

    function detectPlatform(url) {
      const host = url.hostname.replace(/^www\./, '').toLowerCase();
      if (host === 'youtu.be' || host.endsWith('youtube.com')) return 'youtube';
      if (host.endsWith('tiktok.com')) return 'tiktok';
      if (host.endsWith('instagram.com')) return 'instagram';
      if (host.endsWith('spotify.com')) return 'spotify';
      return null;
    }

    function extractYouTubeVideoId(rawUrl) {
      if (!rawUrl) return null;
      const trimmed = rawUrl.trim();
      if (!trimmed) return null;
      let url;
      try {
        url = new URL(trimmed);
      } catch (e) {
        return null;
      }

      const host = url.hostname.replace(/^www\./, '').toLowerCase();
      if (host === 'youtu.be') {
        const id = url.pathname.split('/').filter(Boolean)[0];
        return id || null;
      }

      if (host.endsWith('youtube.com')) {
        // watch?v=ID
        if (url.pathname === '/watch') {
          const id = url.searchParams.get('v');
          return id || null;
        }
        // shorts/ID
        const parts = url.pathname.split('/').filter(Boolean);
        if (parts[0] === 'shorts' && parts[1]) {
          return parts[1];
        }
      }
      return null;
    }

    function extractTikTokInfo(rawUrl) {
      if (!rawUrl) return null;
      const trimmed = rawUrl.trim();
      if (!trimmed) return null;
      let url;
      try {
        url = new URL(trimmed);
      } catch (e) {
        return null;
      }

      const parts = url.pathname.split('/').filter(Boolean);
      if (parts.length >= 3 && parts[1] === 'video' && /^\d+$/.test(parts[2]) && parts[0].startsWith('@')) {
        return { videoId: parts[2], channelHandle: parts[0] };
      }
      return null;
    }

    function isSupportedInstagramPath(pathname) {
      const parts = pathname.split('/').filter(Boolean);
      return parts.length >= 2 && (parts[0] === 'p' || parts[0] === 'reel' || parts[0] === 'tv');
    }

    function extractInstagramShortcode(rawUrl) {
      if (!rawUrl) return null;
      const trimmed = rawUrl.trim();
      if (!trimmed) return null;
      let url;
      try {
        url = new URL(trimmed);
      } catch (e) {
        return null;
      }
      const parts = url.pathname.split('/').filter(Boolean);
      if (parts.length >= 2 && (parts[0] === 'p' || parts[0] === 'reel' || parts[0] === 'tv') && parts[1]) {
        return parts[1];
      }
      return null;
    }

    function extractSpotifyInfo(rawUrl) {
      if (!rawUrl) return null;
      const trimmed = rawUrl.trim();
      if (!trimmed) return null;
      let url;
      try {
        url = new URL(trimmed);
      } catch (e) {
        return null;
      }
      
      // Match pattern: /track/{id}, /album/{id}, /artist/{id}, /playlist/{id}, /show/{id}, /episode/{id}
      // Also handle /intl-{locale}/ prefix
      const pathMatch = url.pathname.match(/\/(track|album|artist|playlist|show|episode)\/([a-zA-Z0-9]+)/);
      if (pathMatch) {
        const type = pathMatch[1];
        const id = pathMatch[2];
        // Determine which API to use
        const useChartmetric = ['track', 'album', 'artist', 'playlist'].includes(type);
        return { type, id, useChartmetric };
      }
      return null;
    }

    function parseLinesToIds(lines) {
      let skipped = 0;
      const invalid = [];
      const entries = [];
      for (const line of lines) {
        const trimmed = line.trim();
        let url;
        try {
          url = new URL(trimmed);
        } catch (e) {
          if (trimmed) {
            skipped += 1;
            invalid.push(trimmed);
          }
          continue;
        }

        const platform = detectPlatform(url);
        if (platform === 'youtube') {
          const id = extractYouTubeVideoId(trimmed);
          if (id) {
            entries.push({ platform, id, url: trimmed });
          } else if (trimmed) {
            skipped += 1;
            invalid.push(trimmed);
          }
        } else if (platform === 'tiktok') {
          const info = extractTikTokInfo(trimmed);
          if (info) {
            entries.push({ platform, id: info.videoId, url: trimmed, channelHandle: info.channelHandle });
          } else if (trimmed) {
            skipped += 1;
            invalid.push(trimmed);
          }
        } else if (platform === 'instagram') {
          if (isSupportedInstagramPath(url.pathname)) {
            const shortcode = extractInstagramShortcode(trimmed);
            entries.push({ platform, id: shortcode || '', url: trimmed });
          } else if (trimmed) {
            skipped += 1;
            invalid.push(trimmed);
          }
        } else if (platform === 'spotify') {
          const info = extractSpotifyInfo(trimmed);
          if (info) {
            entries.push({ platform, id: info.id, url: trimmed, spotifyType: info.type, useChartmetric: info.useChartmetric });
          } else if (trimmed) {
            skipped += 1;
            invalid.push(trimmed);
          }
        } else if (trimmed) {
          skipped += 1;
          invalid.push(trimmed);
        }
      }
      return { entries, skipped, invalid };
    }

    function sanitizeCsvValue(value) {
      if (value === null || value === undefined) return '""';
      let str = String(value);
      if (/^[=+\-@]/.test(str)) {
        str = `'${str}`;
      }
      str = str.replace(/"/g, '""');
      return `"${str}"`;
    }

    function buildCsv(rows) {
      const header = [
        'platform',
        'originalUrl',
        'videoId',
        'title',
        'publishedAt',
        'durationIso',
        'durationSeconds',
        'viewCount',
        'likeCount',
        'commentCount',
        'engagement_likeRate',
        'engagement_commentRate',
        'heroImageUrl',
        'channelHandle'
      ];

      const lines = [header.map(sanitizeCsvValue).join(',')];
      for (const row of rows) {
        const line = [
          row.platform,
          row.originalUrl,
          row.videoId,
          row.title,
          row.publishedAt,
          row.durationIso,
          row.durationSeconds,
          row.viewCount,
          row.likeCount ?? '',
          row.commentCount ?? '',
          row.engagement_likeRate ?? '',
          row.engagement_commentRate ?? '',
          row.heroImageUrl ?? '',
          row.channelHandle ?? ''
        ].map(sanitizeCsvValue).join(',');
        lines.push(line);
      }
      return lines.join('\n');
    }

    function createFilename() {
      const now = new Date();
      const pad = (n) => String(n).padStart(2, '0');
      return `social-media-metadata-${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}-${pad(now.getHours())}${pad(now.getMinutes())}.csv`;
    }

    async function fetchVideo(entry) {
      if (entry.platform === 'youtube') {
        const url = `${API_BASE}/api/video/${encodeURIComponent(entry.id)}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();
      }
      if (entry.platform === 'tiktok') {
        const url = `${API_BASE}/api/tiktok/ytdlp?url=${encodeURIComponent(entry.url)}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();
      }
      if (entry.platform === 'instagram') {
        const url = `${API_BASE}/api/instagram/video?url=${encodeURIComponent(entry.url)}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();
      }
      if (entry.platform === 'spotify') {
        // Use Chartmetric for tracks, albums, artists, playlists; Spotify API for shows, episodes
        const endpoint = entry.useChartmetric ? 'chartmetric' : 'spotify';
        const url = `${API_BASE}/api/${endpoint}/metadata?url=${encodeURIComponent(entry.url)}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();
      }
      throw new Error('Unsupported platform');
    }

    async function processWithLimit(entries, limit, onProgress) {
      const results = [];
      let index = 0;
      let done = 0;
      let failed = 0;
      const counts = { youtube: 0, tiktok: 0, instagram: 0, spotify: 0 };

      async function next() {
        if (index >= entries.length) return;
        const current = index++;
        const entry = entries[current];
        try {
          const data = await fetchVideo(entry);
          results.push({ data, originalUrl: entry.url, id: entry.id, platform: entry.platform, channelHandle: entry.channelHandle || null });
          let ok = false;
          if (entry.platform === 'youtube') {
            ok = data && !data.error && typeof data.videoId === 'string';
          } else if (entry.platform === 'tiktok') {
            ok = data && !data.error && typeof data.videoId === 'string' && typeof (data.inputUrl || data.input_url) === 'string';
          } else if (entry.platform === 'instagram') {
            ok = data && !data.error && typeof data.videoId === 'string' && typeof data.inputUrl === 'string';
          } else if (entry.platform === 'spotify') {
            ok = data && !data.error && typeof data.videoId === 'string';
          }
          if (ok) {
            counts[entry.platform] = (counts[entry.platform] || 0) + 1;
          }
        } catch (e) {
          failed += 1;
          results.push({ data: null, originalUrl: entry.url, id: entry.id, platform: entry.platform, channelHandle: entry.channelHandle || null });
        } finally {
          done += 1;
          onProgress(done, entries.length, failed, counts);
          await next();
        }
      }

      const workers = Array.from({ length: Math.min(limit, entries.length) }, () => next());
      await Promise.all(workers);
      return { results, failed };
    }

    function normalizeDate(dateStr) {
      if (!dateStr) return '';
      try {
        const date = new Date(dateStr);
        if (isNaN(date.getTime())) return '';
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
      } catch (e) {
        return '';
      }
    }

    function mapToCsvRows(results) {
      const rows = [];
      for (const { data: item, originalUrl, id, platform, channelHandle } of results) {
        if (!item || item.error) continue;

        if (platform === 'tiktok') {
          if (typeof item.videoId !== 'string' || !(item.inputUrl || item.input_url)) continue;
          const inputUrl = item.inputUrl || item.input_url;
          const views = item.metrics?.views;
          const likes = item.metrics?.likes;
          const comments = item.metrics?.comments;
          const likeRate = typeof views === 'number' && views > 0 && typeof likes === 'number' ? likes / views : '';
          const commentRate = typeof views === 'number' && views > 0 && typeof comments === 'number' ? comments / views : '';
          rows.push({
            platform,
            originalUrl: inputUrl,
            videoId: item.videoId,
            title: item.description ?? '',
            publishedAt: normalizeDate(item.publishedAt),
            durationIso: '',
            durationSeconds: '',
            viewCount: views ?? '',
            likeCount: likes ?? '',
            commentCount: comments ?? '',
            engagement_likeRate: likeRate,
            engagement_commentRate: commentRate,
            heroImageUrl: item.heroImageUrl ?? '',
            channelHandle: channelHandle ?? ''
          });
          continue;
        }

        if (platform === 'instagram') {
          if (typeof item.videoId !== 'string' || typeof item.inputUrl !== 'string') continue;
          const views = item.metrics?.views;
          const likes = item.metrics?.likes;
          const comments = item.metrics?.comments;
          const likeRate = typeof views === 'number' && views > 0 && typeof likes === 'number' ? likes / views : '';
          const commentRate = typeof views === 'number' && views > 0 && typeof comments === 'number' ? comments / views : '';
          rows.push({
            platform,
            originalUrl: item.inputUrl,
            videoId: item.videoId,
            title: item.description ?? '',
            publishedAt: normalizeDate(item.publishedAt),
            durationIso: '',
            durationSeconds: '',
            viewCount: views ?? '',
            likeCount: likes ?? '',
            commentCount: comments ?? '',
            engagement_likeRate: likeRate,
            engagement_commentRate: commentRate,
            heroImageUrl: item.heroImageUrl ?? '',
            channelHandle: item.authorHandle ?? ''
          });
          continue;
        }

        // YouTube and Spotify (default - both use same normalized format)
        const engagement = item.engagement || {};
        rows.push({
          platform: item.platform || platform,
          originalUrl: item.originalUrl || originalUrl,
          videoId: item.videoId,
          title: item.title ?? null,
          publishedAt: normalizeDate(item.publishedAt),
          durationIso: item.durationIso ?? '',
          durationSeconds: item.durationSeconds ?? '',
          viewCount: item.viewCount ?? '',
          likeCount: item.likeCount ?? '',
          commentCount: item.commentCount ?? '',
          engagement_likeRate: item.engagement_likeRate ?? engagement.likeRate ?? '',
          engagement_commentRate: item.engagement_commentRate ?? engagement.commentRate ?? '',
          heroImageUrl: item.heroImageUrl ?? '',
          channelHandle: item.channelHandle ?? ''
        });
      }
      return rows;
    }

    function resetUI() {
      progressText.textContent = 'Processed 0 videos (YouTube: 0, TikTok: 0, Instagram: 0, Spotify: 0)';
      skippedText.textContent = '';
      failedText.textContent = '';
      downloadLink.style.display = 'none';
      downloadLink.href = '#';
    }

    generateBtn.addEventListener('click', async () => {
      generateBtn.disabled = true;
      generateBtn.textContent = 'Processing...';
      resetUI();

      const lines = urlsInput.value.split(/\r?\n/);
      const { entries, skipped, invalid } = parseLinesToIds(lines);

      if (entries.length === 0) {
        progressText.textContent = 'Processed 0 videos (YouTube: 0, TikTok: 0, Instagram: 0, Spotify: 0)';
        if (skipped > 0) {
          skippedText.textContent = `Skipped ${skipped} invalid URLs.`;
        }
        if (invalid.length > 0) {
          skippedText.textContent = `Skipped ${skipped} invalid URLs: ${invalid.join(', ')}`;
        }
        generateBtn.disabled = false;
        generateBtn.textContent = 'Generate CSV';
        return;
      }

      progressText.textContent = 'Processed 0 videos (YouTube: 0, TikTok: 0, Instagram: 0, Spotify: 0)';
      if (skipped > 0) {
        skippedText.textContent = `Skipped ${skipped} invalid URLs.`;
      }
      if (invalid.length > 0) {
        skippedText.textContent = `Skipped ${skipped} invalid URLs: ${invalid.join(', ')}`;
      }

      const { results, failed } = await processWithLimit(entries, 5, (done, total, failedCount, counts) => {
        const totalSuccess = (counts.youtube || 0) + (counts.tiktok || 0) + (counts.instagram || 0) + (counts.spotify || 0);
        progressText.textContent = `Processed ${totalSuccess} videos (YouTube: ${counts.youtube || 0}, TikTok: ${counts.tiktok || 0}, Instagram: ${counts.instagram || 0}, Spotify: ${counts.spotify || 0})`;
        if (failedCount > 0) {
          failedText.textContent = `Failed ${failedCount} fetches.`;
        }
      });

      if (failed > 0 && !failedText.textContent) {
        failedText.textContent = `Failed ${failed} fetches.`;
      }

      const csvRows = mapToCsvRows(results);
      if (csvRows.length === 0) {
        progressText.textContent = 'No videos fetched successfully.';
        generateBtn.disabled = false;
        generateBtn.textContent = 'Generate CSV';
        return;
      }

      const csv = buildCsv(csvRows);
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      downloadLink.href = url;
      downloadLink.download = createFilename();
      downloadLink.style.display = 'inline-block';

      generateBtn.disabled = false;
      generateBtn.textContent = 'Generate CSV';
    });
  </script>
</body>
</html>
